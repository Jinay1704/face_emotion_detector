services:

  flask:
    build:
      context: "./ml_services"      # Dockerfile is here
      dockerfile: Dockerfile
    container_name: emotionai_flask
    ports:
      - "5001:5001"
    volumes:
      - "./ml_services/models:/app/models"   # mount model file
    environment:
      - FLASK_ENV=development
    networks:
      - emotionai_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: emotionai_server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - ML_SERVICE_URL=http://flask:5001
      - NODE_ENV=development
    depends_on:
      flask:
        condition: service_healthy
    networks:
      - emotionai_net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: emotionai_client
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server
    networks:
      - emotionai_net
    restart: unless-stopped

networks:
  emotionai_net:
    driver: bridge